@if(formTab && showForm) {
  <div [class]="'p-fluid w-full animate__animated animate__' + animation" >
    <form [formGroup]="formTab" (ngSubmit)="onSubmit()">
      <div class="formgrid grid mt-1">
        <div class="field col-12 md:col-2 lg:col-2 xl:col-2" >
          <div class="formgrid grid">
            <div class="field col-12 md:col-12 mt-3" >
              <p-floatLabel>
                <p-autoComplete
                  [autofocus]="true"
                  formControlName="clientId"
                  [suggestions]="filteredClients"
                  (completeMethod)="searchClient($event)"
                  (onSelect)="changeClient($event)"
                  (onClear)="clearClient($event)"
                  optionValue="id"
                  [showClear]="true"
                  optionLabel="showName"/>
                <label>
                  Client
                  <span class="required">*</span>
                </label>
              </p-floatLabel>
            </div>
          </div>
        </div>
        <div class="field col-12 md:col-2 lg:col-2 xl:col-2" >
          <div class="formgrid grid">
            <div class="field col-12 md:col-12 mt-3" >
              <p-floatLabel>
                <p-autoComplete
                  formControlName="supplierId"
                  [suggestions]="filteredSupplier"
                  (completeMethod)="searchSupplier($event)"
                  (onSelect)="changeSupplier($event)"
                  (onClear)="clearSupplier($event)"
                  optionValue="id"
                  [showClear]="true"
                  optionLabel="name"/>
                <label>
                  Supplier
                  <span class="required">*</span>
                </label>
              </p-floatLabel>
            </div>
          </div>
        </div>
        <div class="field col-12 md:col-3 lg:col-3 xl:col-3" >
          <div class="formgrid grid">
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-dropdown
                  [options]="listCurrency()"
                  optionLabel="value"
                  formControlName="currency"
                  optionValue="key" />
                <label>
                  Currency
                  <span class="required">*</span>
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-dropdown
                  [options]="listEmployees()"
                  optionLabel="fullName"
                  [filter]="true"
                  filterBy="name"
                  formControlName="salesRepId"
                  optionValue="id" />
                <label>
                  Sales Rep
                  <span class="required">*</span>
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-dropdown
                  [options]="listPaymenTerms()"
                  optionLabel="value"
                  formControlName="paymentTerms"
                  optionValue="key" />
                <label>
                  Payment Terms
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-inputNumber
                  mode="decimal"
                  [useGrouping]="false"
                  [max]="99999"
                  formControlName="leadTime" />
                <label>
                  Lead Time
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-dropdown
                  [options]="listLeadTimeType()"
                  optionLabel="value"
                  formControlName="leadTimeType"
                  optionValue="key" />
                <label>
                  Lead Time Type
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-inputNumber
                  mode="decimal"
                  [useGrouping]="false"
                  suffix=" %"
                  [max]="100"
                  formControlName="salesTax" />
                <label>
                  Sales Tax
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" >
              <p-floatLabel>
                <p-dropdown
                  [options]="listIpPurchaseOrderStatus()"
                  optionLabel="value"
                  (onChange)="changeStatus($event)"
                  formControlName="status"
                  optionValue="key" />
                <label>
                  Status
                  <span class="required">*</span>
                </label>
              </p-floatLabel>
            </div>
            <div class="field col-12 md:col-6 mt-3" ></div>
            <div class="field col-12 md:col-3 mt-3" >
              @if (tabItem.type !== 'view') {
                <button pButton
                  label="Save"
                  icon="pi pi-save"
                  severity="success"
                  [disabled]="formTab.disabled || formTab.invalid || tabItem.pristine"
                  type="submit">
                </button>
              }
            </div>
          </div>
        </div>
        <div class="field col-12 md:col-5 lg:col-5 xl:col-5" >
          <div class="formgrid grid">
            <div [class]="'field col-12 mt-1'" >
              <p-tabView>
                <p-tabPanel header="Remarks">
                  <textarea
                    [rows]="9"
                    pInputTextarea
                    style="resize: none"
                    placeholder="Remarks"
                    formControlName="remarks">
                  </textarea>
                </p-tabPanel>
                <p-tabPanel header="Internal Remarks">
                  <textarea
                    [rows]="9"
                    pInputTextarea
                    placeholder="Internal Remarks"
                    style="resize: none"
                    formControlName="internalRemarks">
                  </textarea>
                </p-tabPanel>
                <p-tabPanel header="Ship To">
                  <div class="formgrid grid">
                    <div class="field col-12 md:col-12 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToName"
                          maxlength="150"
                          type="text"/>
                        <label>Ship To Name</label>
                      </p-floatLabel>
                    </div>
                    <div class="field col-12 md:col-12 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToAddress"
                          maxlength="150"
                          type="text"/>
                        <label>Ship To Address</label>
                      </p-floatLabel>
                    </div>
                    <div class="field col-12 md:col-6 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToCity"
                          maxlength="100"
                          type="text"/>
                        <label>Ship To City</label>
                      </p-floatLabel>
                    </div>
                    <div class="field col-12 md:col-6 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToPhone"
                          maxlength="50"
                          type="text"/>
                        <label>Ship To Phone</label>
                      </p-floatLabel>
                    </div>
                    <div class="field col-12 md:col-6 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToContactName"
                          maxlength="150"
                          type="text"/>
                        <label>Ship To Contact Name</label>
                      </p-floatLabel>
                    </div>
                    <div class="field col-12 md:col-6 mt-1">
                      <p-floatLabel>
                        <input
                          pInputText
                          formControlName="shipToEmail"
                          maxlength="150"
                          type="text"/>
                        <label>Ship To Email</label>
                      </p-floatLabel>
                    </div>
                  </div>
                </p-tabPanel>
              </p-tabView>
            </div>
          </div>
        </div>
      </div>
      <div class="formgrid grid" style="margin-bottom: -2.5rem;">
        <div class="field col-12 md:col-8 lg:col-8 xl:col-9 md:mt-5 lg:mt-5 xl:mt-5">
          @if(item() && item()?.createdAt) {
            <p-chip>
              <div class="p-2">
                <b>Created: </b>
                {{item()?.createdAt | date:'MMM dd, yyyy hh:mm a'}}
              </div>
            </p-chip>
          }
        </div>
        @if (permissions().viewHistoryPurchaseOrder && tabItem.type !== 'create') {
          <div class="field col-12 md:col-2 lg:col-2 xl:col-1 md:mt-5 lg:mt-5 xl:mt-5">
            <button pButton
              label="View History"
              icon="pi pi-book"
              class="w-full"
              severity="help"
              (click)="openHistory(item()!)"
              type="button">
            </button>
          </div>
        }
      </div>
    </form>
  </div>
} @else {
  @if (loading()) {
    <div class="field col animate__animated animate__fadeIn">
      <p-progressBar
          class="w-20rem animate__animated animate__fadeIn"
          mode="indeterminate">
      </p-progressBar>
    </div>
  }
}
