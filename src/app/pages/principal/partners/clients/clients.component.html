@if(!loading()) {
  <div class="card animate__animated animate__fadeIn">
    <p-tabView [(activeIndex)]="activeTab" [scrollable]="true" [controlClose]="true" (onClose)="closeTab($event)">
      <p-tabPanel header="Clients">
        <ng-template pTemplate="header">
          <i class="pi pi-users"></i>
          <span>Clients</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-list-clients
            (openedClient)="openTab($event)"
            [clientPermissions]="clientPermissions">
          </app-list-clients>
        </ng-template>
      </p-tabPanel>
      @for(clientTab of tabs(); track clientTab) {
        <p-tabPanel [header]="clientTab.item.name" [closable]="true">
          <ng-template pTemplate="header">
            <span>{{ (clientTab.item.code ? '(' + clientTab.item.code +') ' : '') + clientTab.item.name }}</span>
          </ng-template>
          <ng-template pTemplate="content">
            <app-form-client-prospect
              [index]="$index"
              [tabItem]="clientTab"
              [permissionsClient]="clientPermissions"
              (onCloseClientProspect)="closeTab($event)">
            </app-form-client-prospect>
          </ng-template>
        </p-tabPanel>
      }
    </p-tabView>
  </div>
} @else {
  <div style="margin-top: 3rem;">
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
  </div>
  <br>
  <p-skeleton width="100%" height="40rem" />
}
