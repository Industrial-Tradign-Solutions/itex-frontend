@if(!loading()) {
  <div class="card animate__animated animate__fadeIn">
    <p-tabView [(activeIndex)]="activeTab" [scrollable]="true" [controlClose]="true" (onClose)="closeTab($event)">
      <p-tabPanel header="Quotations">
        <ng-template pTemplate="header">
          <i class="pi pi-briefcase"></i>
          <span>Quotations</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-list-ip-quotation
            (opened)="openTab($event)"
            [permissions]="ipQuotationPermissions">
          </app-list-ip-quotation>
        </ng-template>
      </p-tabPanel>
      @for(quotationTab of tabs(); track quotationTab) {
        <p-tabPanel [header]="quotationTab.item.name" [closable]="true">
          <ng-template pTemplate="header">
            <span>{{ quotationTab.item.name }}</span>
          </ng-template>
          <ng-template pTemplate="content">
            <app-form-ip-quotation
              [index]="$index"
              [tabItem]="quotationTab"
              [permissions]="ipQuotationPermissions"
              (opened)="openTab($event)"
              (onClose)="closeTab($event)">
            </app-form-ip-quotation>

          </ng-template>
        </p-tabPanel>
      }
    </p-tabView>
  </div>
} @else {
  <div style="margin-top: 3rem;">
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
  </div>
  <br>
  <p-skeleton width="100%" height="40rem" />
}
