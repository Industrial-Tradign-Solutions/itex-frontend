@if(!loading()) {
  <div class="card animate__animated animate__fadeIn">
    <p-tabView [(activeIndex)]="activeTab" [scrollable]="true" [controlClose]="true" (onClose)="closeTab($event)">
      <p-tabPanel header="Purchase Orders">
        <ng-template pTemplate="header">
          <i class="pi pi-shop"></i>
          <span>Purchase Orders</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-list-ip-purchase-order
            (opened)="openTab($event)"
            [permissions]="ipPurchaseOrderPermissions">
          </app-list-ip-purchase-order>
        </ng-template>
      </p-tabPanel>
      @for(purchaseOrderTab of tabs(); track purchaseOrderTab) {
        <p-tabPanel [header]="purchaseOrderTab.item.name" [closable]="true">
          <ng-template pTemplate="header">
            <span>{{ purchaseOrderTab.item.name }}</span>
          </ng-template>
          <ng-template pTemplate="content">
            <app-form-ip-purchase-order
              [index]="$index"
              [tabItem]="purchaseOrderTab"
              [permissions]="ipPurchaseOrderPermissions"
              (opened)="openTab($event)"
              (onClose)="closeTab($event)">
            </app-form-ip-purchase-order>
          </ng-template>
        </p-tabPanel>
      }
    </p-tabView>
  </div>
} @else {
  <div style="margin-top: 3rem;">
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
  </div>
  <br>
  <p-skeleton width="100%" height="40rem" />
}
