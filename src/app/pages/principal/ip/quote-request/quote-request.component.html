@if(!loading()) {
  <div class="card animate__animated animate__fadeIn">
    <p-tabView [(activeIndex)]="activeTab" [scrollable]="true" [controlClose]="true" (onClose)="closeTab($event)">
      <p-tabPanel header="Quote Requests">
        <ng-template pTemplate="header">
          <i class="pi pi-file-o"></i>
          <span>Quote Requests</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-list-ip-quote-request
            (opened)="openTab($event)"
            [permissions]="ipQuoteRequestPermissions">
          </app-list-ip-quote-request>
        </ng-template>
      </p-tabPanel>
      @for(quoteRequestTab of tabs(); track quoteRequestTab) {
        <p-tabPanel [header]="quoteRequestTab.item.name" [closable]="true">
          <ng-template pTemplate="header">
            <span>{{ quoteRequestTab.item.name }}</span>
          </ng-template>
          <ng-template pTemplate="content">
            <app-form-ip-quote-request
              [index]="$index"
              [tabItem]="quoteRequestTab"
              [permissions]="ipQuoteRequestPermissions"
              (opened)="openTab($event)"
              (onClose)="closeTab($event)">
            </app-form-ip-quote-request>
          </ng-template>
        </p-tabPanel>
      }
    </p-tabView>
  </div>
} @else {
  <div style="margin-top: 3rem;">
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
  </div>
  <br>
  <p-skeleton width="100%" height="40rem" />
}
