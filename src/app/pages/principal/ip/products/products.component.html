@if(!loading()) {
  <div class="card animate__animated animate__fadeIn">
    <p-tabView [(activeIndex)]="activeTab" [scrollable]="true" [controlClose]="true" (onClose)="closeTab($event)">
      <p-tabPanel header="Products">
        <ng-template pTemplate="header">
          <i class="pi pi-box"></i>
          <span>Products</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-list-ip-products
            (opened)="openTab($event)"
            [permissions]="ipProductPermissions">
          </app-list-ip-products>
        </ng-template>
      </p-tabPanel>
      @if(ipProductPermissions().importIpProduct) {
        <p-tabPanel header="ImportProducts">
          <ng-template pTemplate="header">
            <i class="pi pi-upload"></i>
            <span>Import Products</span>
          </ng-template>
          <ng-template pTemplate="content">
            <app-import-ip-products>
            </app-import-ip-products>
          </ng-template>
        </p-tabPanel>
      }
      @for(productTab of tabs(); track productTab) {
        @if(!productTab.isImport) {
          <p-tabPanel [header]="productTab.item.name" [closable]="true">
            <ng-template pTemplate="header">
              <span>{{ productTab.item.name }}</span>
            </ng-template>
            <ng-template pTemplate="content">
              <app-form-ip-products
                [index]="$index"
                [tabItem]="productTab"
                [permissions]="ipProductPermissions"
                (opened)="openTab($event)"
                (onClose)="closeTab($event)">
              </app-form-ip-products>
            </ng-template>
          </p-tabPanel>
        }
      }
    </p-tabView>
  </div>
} @else {
  <div style="margin-top: 3rem;">
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
    <p-skeleton width="100%" styleClass="mb-2"/>
  </div>
  <br>
  <p-skeleton width="100%" height="40rem" />
}
