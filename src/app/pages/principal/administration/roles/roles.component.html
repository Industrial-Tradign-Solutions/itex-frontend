<div class="grid">
	<div class="col-12">
		<div class="card">
            <p-tabView>
                <p-tabPanel header="Roles">
                    <ng-template pTemplate="header">
                        <span><i class="pi pi-users"></i> Roles</span>
                    </ng-template>
                    <app-admin-permissions-roles
                        (listActiveRoles)="listActiveRolesAction()">
                    </app-admin-permissions-roles>
                </p-tabPanel>
                <p-tabPanel header="Modules" *ngIf="rolePermissions.updateRoleModules">
                    <ng-template pTemplate="header">
                        <span><i class="pi pi-lock-open"></i> Modules</span>
                    </ng-template>
                    <app-admin-permissions-modules [listActiveRoles]="listActiveRoles" (listActiveRolesAction)="listActiveRolesAction()"></app-admin-permissions-modules>
                </p-tabPanel>
                <p-tabPanel header="Actions" *ngIf="rolePermissions.updateRoleActions">
                    <ng-template pTemplate="header">
                        <span><i class="pi pi-key"></i> Actions</span>
                    </ng-template>
                    <app-admin-permissions-actions [listActiveRoles]="listActiveRoles" (listActiveRolesAction)="listActiveRolesAction()"></app-admin-permissions-actions>
                </p-tabPanel>
            </p-tabView>
        </div>
    </div>
</div>
