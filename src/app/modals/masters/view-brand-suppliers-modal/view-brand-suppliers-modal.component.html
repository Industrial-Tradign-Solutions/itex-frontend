<div class="p-fluid" style="margin-top: 1rem; margin-bottom: 1rem;">
  <div class="formgrid grid" >
    <div class="field col-12 md:col-8">
      <p-autoComplete
        [(ngModel)]="supplierId"
        [suggestions]="filteredSuppliers"
        (completeMethod)="searchSupplier($event)"
        optionValue="id"
        placeholder="Supplier"
        [showClear]="true"
        appendTo="body"
        optionLabel="name"/>
    </div>
    <div class="field col-12 md:col-4">
        <button
          pButton
          type="button"
          label="Save"
          icon="pi pi-save"
          [disabled]="validateUUID()"
          severity="success"
          (click)="addSupplier()"
          class="p-button-sm">
        </button>
    </div>
  </div>
</div>
<p-table
  #dt1
  [value]="listSuppliers()"
  styleClass="p-datatable-sm"
  dataKey="id"
  [rows]="10"
  [loading]="loading()"
  [paginator]="true"
  [globalFilterFields]="['name']"
  responsiveLayout="scroll">
  <ng-template pTemplate="header" >
      <tr>
          <th style="min-width: 11rem" pSortableColumn="name">
              <div class="flex justify-content-between align-items-center">
                  SUPPLIER NAME
                  <p-sortIcon field="name"></p-sortIcon>
              </div>
          </th>
          <th style="min-width: 2rem">
          </th>
      </tr>
  </ng-template>
  <ng-template pTemplate="body" let-supplier>
      <tr>
        <td>
            {{supplier.name}}
        </td>
        <td style="text-align: end;">
          <button
            pButton
            type="button"
            icon="pi pi-eye"
            class="p-button-rounded p-button-text"
            (click)="openSupplier(supplier)"
            pTooltip="Open Supplier"
            severity="secondary"
            tooltipPosition="left">
          </button>
          @if(brandsPermissions().deleteSupplierByBrand) {
            <button
              pButton
              type="button"
              icon="pi pi-ban"
              class="p-button-rounded p-button-text"
              pTooltip="Unassign"
              (click)="unAssignSupplierByBrand(supplier)"
              severity="danger"
              tooltipPosition="right">
            </button>
          }
        </td>
      </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
      <tr>
          <td colspan="8">No suppliers found</td>
      </tr>
  </ng-template>
  <ng-template pTemplate="loadingbody">
      <tr>
          <td colspan="8">Loading suppliers, please wait</td>
      </tr>
  </ng-template>
</p-table>
