@if(formCity) {
  <form [formGroup]="formCity" (ngSubmit)="onSubmit()">
    <div class="p-fluid">
        <div class="p-formgrid grid">
            <div class="field col-12 md:col-12">
                <label>
                    Name
                    <span class="required">*</span>
                </label>
                <input pInputText type="text" formControlName="name"/>
            </div>
            <div class="field col-12 md:col-6">
              <label htmlFor="countryId">
                Country
                <span class="required">*</span>
              </label>
              <p-dropdown
                (onClick)="loadCountries()"
                (onChange)="filterStates()"
                appendTo="body"
                placeholder="Country"
                [options]="listCountries()"
                optionLabel="name"
                optionValue="id"
                [filter]="true"
                filterBy="name,nameShort"
                formControlName="countryId">
              </p-dropdown>
            </div>
            <div class="field col-12 md:col-6">
              <label htmlFor="stateId">
                State
                <span class="required">*</span>
              </label>
              <p-dropdown
                (onClick)="loadStates()"
                appendTo="body"
                placeholder="State"
                [options]="listStates()"
                optionLabel="name"
                optionValue="id"
                [filter]="true"
                filterBy="name,nameShort"
                formControlName="stateId">
              </p-dropdown>
            </div>
            <div class="field col-12 md:col-6">
              <label>
                Latitude
                <span class="required">*</span>
              </label>
              <input pInputText type="text" pattern="-?[0-9]*\.?[0-9]+" formControlName="latitude"/>
          </div>
          <div class="field col-12 md:col-6">
              <label>
                Longitude
                <span class="required">*</span>
              </label>
              <input pInputText type="text" pattern="-?[0-9]*\.?[0-9]+" formControlName="longitude"/>
          </div>
        </div>
    </div>
    @if (loading()) {
      <div class="field col animate__animated animate__fadeIn">
        <p-progressBar
            class="w-20rem animate__animated animate__fadeIn"
            mode="indeterminate">
        </p-progressBar>
      </div>
    }
    @if(error() !== null) {
      <label class="error">
        <em>
            {{error()}}
        </em>
      </label>
    }
    @if (!loading()) {
      <div class="mt-3 flex justify-content-end column-gap-4">
        <p-button
            icon="pi pi-times-circle"
            styleClass="p-button-sm p-button-danger"
            label="Cancel"
            (onClick)="closeModal()"
        ></p-button>
        <button
            pButton
            type="submit"
            label="Save"
            icon="pi pi-save"
            [disabled]="formCity.invalid"
            class="p-button-sm p-button-success">
        </button>
      </div>
    }
  </form>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
