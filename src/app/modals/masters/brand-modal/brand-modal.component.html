@if (formBrand) {
  <form [formGroup]="formBrand" (ngSubmit)="validateAndSaveBrand()">
    <div class="p-fluid">
      <div class="formgrid grid">
          <div class="field col-12 md:col-6">
              <label>
                Brand
                <span class="required">*</span>
              </label>
              <input pInputText type="text" formControlName="name"/>
          </div>
            <div class="field col-12 md:col-6">
              <label>
                Supplier
              </label>
              <p-autoComplete
                formControlName="supplierId"
                [suggestions]="filteredSuppliers"
                (completeMethod)="searchSupplier($event)"
                optionValue="id"
                [showClear]="true"
                appendTo="body"
                optionLabel="name"/>
          </div>
      </div>
    </div>
    @if (loading()) {
      <div class="field col animate__animated animate__fadeIn">
        <p-progressBar
            class="w-20rem animate__animated animate__fadeIn"
            mode="indeterminate">
        </p-progressBar>
      </div>
    }
    @if(error() !== null && !loading()) {
      <label class="error">
        <em>
            {{error()}}
        </em>
      </label>
    }
    @if (!loading()) {
      <div class="mt-3 flex justify-content-end column-gap-4">
        <p-button
          icon="pi pi-times-circle"
          styleClass="p-button-sm p-button-danger"
          label="Cancel"
          (onClick)="closeModal()"
        ></p-button>
        <button
          pButton
          type="submit"
          label="Save"
          icon="pi pi-save"
          [disabled]="formBrand.invalid"
          severity="success"
          class="p-button-sm">
        </button>
      </div>
    }
  </form>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
