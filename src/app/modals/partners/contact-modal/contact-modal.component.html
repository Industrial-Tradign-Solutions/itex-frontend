@if(formContact) {
  <form [formGroup]="formContact" (ngSubmit)="saveAction()">
    <div class="p-fluid">
      <div class="formgrid grid">
          <div class="field col-12 md:col-3">
              <label>
                Title
              </label>
              <input pInputText type="text" formControlName="title" maxlength="255"/>
          </div>
          <div class="field col-12 md:col-3">
            <label>
              Name
              <span class="required">*</span>
            </label>
            <input pInputText type="text" formControlName="name" maxlength="255"/>
          </div>
          <div class="field col-12 md:col-4">
            <label>
                E-mail
            </label>
            <input pInputText type="text" formControlName="email" maxlength="150"/>
          </div>
          <div class="field col-12 md:col-2">
            <label>
              Main Contact?
            </label>
            <br>
            <p-checkbox formControlName="validMain" [binary]="true" ></p-checkbox>
          </div>
      </div>
    </div>
    <p-table
      [value]="phones.controls"
      dataKey="value.localId"
      editMode="row"
      [tableStyle]="{'min-width': '50rem'}"
      [scrollable]="true"
      scrollHeight="300px"
      styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>TYPE</th>
          <th>COUNTRY CODE</th>
          <th>CITY CODE</th>
          <th>PHONE NUMBER</th>
          <th>EXTENSION</th>
          <th>MAIN PHONE?</th>
          <th style="width: 4rem; text-align: end;">
            <button
              pButton
              pRipple
              type="button"
              icon="pi pi-plus"
              [disabled]="formContact.disabled"
              (click)="newPhone()"
              severity="info"
              pTooltip="Add Phone"
              tooltipPosition="left"
              class="p-button-rounded p-button-text">
            </button>
          </th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-phone let-iii="rowIndex" formArrayName="listPhones">
        <tr [formGroupName]="iii" [ngClass]="{'row-main': phone.value.validMain}" >
          <td>
            <p-dropdown
              [options]="listPhoneTypes()"
              optionLabel="value"
              appendTo="body"
              formControlName="type"
              optionValue="key" />
          </td>
          <td>
            <p-inputNumber
              formControlName="countryCode"
              [minFractionDigits]="0"
              [maxlength]="3"
              [useGrouping]="false"
              mode="decimal"/>
          </td>
          <td>
            <p-inputNumber
              formControlName="cityCode"
              [minFractionDigits]="0"
              [maxlength]="3"
              [useGrouping]="false"
              mode="decimal"/>
          </td>
          <td>
            <p-inputNumber
              formControlName="phoneNumber"
              [minFractionDigits]="0"
              [maxlength]="15"
              [useGrouping]="false"
              mode="decimal"/>
          </td>
          <td>
            <p-inputNumber
              formControlName="ext"
              [minFractionDigits]="0"
              [maxlength]="5"
              [useGrouping]="false"
              mode="decimal"/>
          </td>
          <td>
            <p-checkbox
              formControlName="validMain"
              (onChange)="setMainPhone(phone.value.localId)"
              [binary]="true">
            </p-checkbox>
          </td>
          <td>
            <button
              pButton
              pRipple
              type="button"
              icon="pi pi-ban"
              [disabled]="formContact.disabled || phones.controls.length === 1"
              (click)="deleteClientContactPhone(iii)"
              class="p-button-rounded p-button-text"
              pTooltip="Disable Contact"
              tooltipPosition="right"
              severity="danger">
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>
    @if (loading()) {
      <div class="field col animate__animated animate__fadeIn">
        <p-progressBar
            class="w-20rem animate__animated animate__fadeIn"
            mode="indeterminate">
        </p-progressBar>
      </div>
    }
    @if(error() !== null) {
      <label class="error">
        <em>
            {{error()}}
        </em>
      </label>
    }
    @if (!loading()) {
      <div class="mt-3 flex justify-content-end column-gap-4">
        @if (this.type() !== 'view') {
          <p-button
            icon="pi pi-times-circle"
            styleClass="p-button-sm p-button-danger"
            label="Cancel"
            (onClick)="closeModal()">
          </p-button>
          <button
            pButton
            type="submit"
            label="Save"
            icon="pi pi-save"
            [disabled]="formContact.invalid"
            class="p-button-sm p-button-success">
            </button>
        } @else {
          <p-button
            icon="pi pi-times-circle"
            styleClass="p-button-sm p-button-danger"
            label="Close"
            (onClick)="closeModal()">
          </p-button>
        }
      </div>
    }
  </form>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
