@if (formProduct) {
  <form [formGroup]="formProduct" (ngSubmit)="onSubmit()">
    <div class="p-fluid">
      <div class="formgrid grid">
          <div class="field col-12 md:col-6">
            <label>
              Profit Margin
              <span class="required">*</span>
            </label>
            <p-inputNumber
              formControlName="profitMargin"
              mode="decimal"
              [min]="1"
              [max]="100"
              suffix="%"/>
          </div>
          <div class="field col-12 md:col-6">
            <label>
              Condition
            </label>
            <p-dropdown
              formControlName="condition"
              [options]="listCondition()"
              optionValue="value"
              optionLabel="key"
              appendTo="body"
              placeholder="Select Condition" />
          </div>
      </div>
    </div>
    @if (loading()) {
      <div class="field col animate__animated animate__fadeIn">
        <p-progressBar
            class="w-20rem animate__animated animate__fadeIn"
            mode="indeterminate">
        </p-progressBar>
      </div>
    }
    @if (!loading()) {
      <div class="mt-3 flex justify-content-end column-gap-4">
        <p-button
          icon="pi pi-times-circle"
          styleClass="p-button-sm p-button-danger"
          label="Cancel"
          (onClick)="closeModal()"
        ></p-button>
        <button
          pButton
          type="submit"
          label="Save"
          icon="pi pi-save"
          [disabled]="formProduct.invalid"
          severity="success"
          class="p-button-sm">
        </button>
      </div>
    }
  </form>

} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
