@if (!loading()) {
  <div class="animate__animated animate__fadeIn">
    @if (availableCharges().length === 0) {
      <div class="flex justify-content-center align-items-center" style="min-height: 10rem;">
        <span class="text-lg text-500">No other charges available to import from QR</span>
      </div>
    } @else {
      <p-table
        styleClass="p-datatable-sm"
        [value]="availableCharges()"
        [scrollable]="true"
        scrollHeight="40rem"
        dataKey="id"
        [rowHover]="true">
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 3rem;"></th>
            <th>QR #</th>
            <th>DESCRIPTION</th>
            <th>VALUE</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-charge>
          <tr>
            <td>
              <input
                type="checkbox"
                [checked]="_selectedIds().has(charge.id)"
                (click)="toggleSelect(charge.id)" />
            </td>
            <td>{{ charge.qrNumber }}</td>
            <td>{{ charge.description }}</td>
            <td>{{ charge.value | customCurrency:currency():'1.2-5' }}</td>
          </tr>
        </ng-template>
      </p-table>
    }
  </div>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
      class="w-20rem animate__animated animate__fadeIn"
      mode="indeterminate">
    </p-progressBar>
  </div>
}
<div class="mt-3 flex justify-content-end column-gap-4">
  <button
    pButton
    type="button"
    icon="pi pi-times-circle"
    label="Cancel"
    class="p-button-sm p-button-danger"
    (click)="closeModal()">
  </button>
  <button
    pButton
    type="button"
    icon="pi pi-upload"
    label="Import"
    class="p-button-sm p-button-success"
    [disabled]="_selectedIds().size === 0 || importing()"
    (click)="importSelected()">
  </button>
</div>
