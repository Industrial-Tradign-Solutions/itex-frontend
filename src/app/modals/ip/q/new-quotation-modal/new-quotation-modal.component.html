@if(!loading()) {
  <div class="p-fluid w-full mt-4">
    <div class="formgrid grid">
      <div class="field col-12 md:col-6">
        <p-floatLabel>
          <p-autoComplete
            [suggestions]="filteredClients"
            (completeMethod)="searchClient($event)"
            (onKeyUp)="searchByClient($event)"
            optionValue="id"
            appendTo="body"
            [(ngModel)]="client"
            [showClear]="true"
            (onClear)="clearClient()"
            (onSelect)="search()"
            optionLabel="showName"/>
          <label>
            Client
          </label>
        </p-floatLabel>
      </div>
      <div class="field col-12 md:col-3" >
        <p-floatLabel>
          <p-dropdown
            selected
            [options]="listCurrency()"
            optionLabel="value"
            (onChange)="search()"
            [(ngModel)]="currency"
            appendTo="body"
            optionValue="key" />
          <label>
            Currency
          </label>
        </p-floatLabel>
      </div>
      <div class="field col-12 md:col-3">
        <div class="flex align-items-center check">
          <p-checkbox
            value="View Completed QR"
            [(ngModel)]="viewCompletedQR"
            (onChange)="search()"
            [binary]="true" />
          <label class="lablel-check">View Completed QR</label>
        </div>
      </div>
      <div class="col-12">
        @if(listQR().length > 0) {
          <p-table
            [value]="listQR()"
            [(selection)]="selectedQR"
            dataKey="id"
            [scrollable]="true"
            scrollHeight="20rem"
            [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="caption">
                <div class="list-title">
                  <b>LIST QUOTE REQUESTS</b>
                </div>
            </ng-template>
            <ng-template pTemplate="header">
              <tr>
                <th style="width: 4rem"><p-tableHeaderCheckbox /></th>
                <th>QR #</th>
                <th>SUPPLIER</th>
                <th>STATUS</th>
                <th>DATE OF CREATED</th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-quoteRequest>
              <tr>
                <td>
                  <p-tableCheckbox [value]="quoteRequest" />
                </td>
                <td>{{quoteRequest.name}}</td>
                <td>{{quoteRequest.supplier.name}}</td>
                <td>
                  <span [class]="'customer-badge status-' + getStatusColor(quoteRequest.status)">
                      {{quoteRequest.status}}
                  </span>
                </td>
                <td>{{quoteRequest.createdAt | date:'MMM dd, yyyy hh:mm a'}}</td>
              </tr>
            </ng-template>
          </p-table>
        }
      </div>
    </div>
  </div>
  <div class="mt-3 flex justify-content-end column-gap-4">
    <button
      type="button"
      pButton
      icon="pi pi-times-circle"
      class="p-button-sm p-button-danger"
      label="Cancel"
      (click)="closeModal()">
    </button>
    <button
      pButton
      type="button"
      label="Save"
      icon="pi pi-save"
      [disabled]="client === ''"
      (click)="createQuotation()"
      class="p-button-sm p-button-success">
    </button>
  </div>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
