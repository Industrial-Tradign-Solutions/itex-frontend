@if(!loading()) {
  <p-table
  styleClass="p-datatable-sm"
  [value]="displayCharges()"
  [scrollable]="true"
  scrollHeight="50rem"
  dataKey="id"
  [loading]="loading()">
    <ng-template pTemplate="header" >
      <tr>
        <th style="min-width: 8rem;">QR #</th>
        <th>DESCRIPTION</th>
        <th>VALUE</th>
        @if (canShowActions()) {
          <th style="min-width: 2rem; text-align: end;"></th>
        }
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-charge>
      <tr>
        <td>
          @if (charge.isImported) {
            {{ charge.qrNumber }}
          }
        </td>
        <td>
          {{ charge.description }}
        </td>
        <td>
          {{ charge.value | customCurrency:currency():'1.2-5' }}
        </td>
        @if (canShowActions()) {
          <td style="text-align: end;">
            @if (!charge.isImported) {
              <button
                pButton
                type="button"
                icon="pi pi-pencil"
                class="p-button-rounded p-button-text"
                pTooltip="Edit"
                severity="warning"
                (click)="openModalOtherCharges('edit', charge)"
                tooltipPosition="left">
              </button>
            }
            <button
              pButton
              type="button"
              icon="pi pi-trash"
              class="p-button-rounded p-button-text"
              pTooltip="Remove"
              severity="danger"
              (click)="deleteOtherCharge(charge)"
              tooltipPosition="right">
            </button>
          </td>
        }
      </tr>
    </ng-template>
  </p-table>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
<div class="animate__animated animate__fadeIn" >
  <div class="mt-3 flex justify-content-end column-gap-4">
    @if (canShowActions()) {
      <button
        pButton
        type="button"
        icon="pi pi-plus"
        label="Create"
        class="p-button-sm p-button-success"
        (click)="openModalOtherCharges('create')">
      </button>
      <button
        pButton
        type="button"
        icon="pi pi-upload"
        label="Import from QR"
        class="p-button-sm p-button-info"
        (click)="openModalImportFromQr()">
      </button>
    }
    <button
        pButton
        type="button"
        label="Close"
        icon="pi pi-times-circle"
        severity="danger"
        (click)="closeModal()"
        class="p-button-sm">
    </button>
  </div>
</div>
