@if(!loading()) {
  <div class="animate__animated animate__fadeIn">
    <div class="p-fluid">
      <div class="formgrid grid">
        <div class="field col-12">
          <p-table
            #dt
            styleClass="p-datatable-sm"
            [value]="listAvailableQRs()"
            [(selection)]="selectedQRs"
            (selectionChange)="onSelectionChange($event)"
            [scrollable]="true"
            scrollHeight="25rem"
            dataKey="id"
            [loading]="loading()">
            <ng-template pTemplate="header">
              <tr>
                <th style="width: 3rem">
                  <p-tableHeaderCheckbox />
                </th>
                <th style="min-width: 8rem">
                  <div class="flex justify-content-between">
                    QR #
                  </div>
                </th>
                <th style="min-width: 12rem">
                  <div class="flex justify-content-between">
                    SUPPLIER
                  </div>
                </th>
                <th style="min-width: 8rem">
                  <div class="flex justify-content-between">
                    PRODUCTS
                  </div>
                </th>
                <th style="min-width: 10rem">
                  <div class="flex justify-content-between">
                    SUBTOTAL
                  </div>
                </th>
                <th style="min-width: 8rem">
                  <div class="flex justify-content-between">
                    STATUS
                  </div>
                </th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-qr>
              <tr>
                <td>
                  <p-tableCheckbox [value]="qr" />
                </td>
                <td>
                  {{ qr.number }}
                </td>
                <td>
                  {{ qr.supplierName }}
                </td>
                <td style="text-align: center;">
                  {{ qr.totalProducts }}
                </td>
                <td>
                  {{ qr.subtotal | customCurrency:currency():'1.2-5' }}
                </td>
                <td>
                  <p-tag
                    [value]="qr.status"
                    [severity]="qr.status === 'COMPLETED' ? 'success' : 'info'">
                  </p-tag>
                </td>
              </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
              <tr>
                <td colspan="6" class="text-center">
                  No available Quote Requests found for this client and currency
                </td>
              </tr>
            </ng-template>
          </p-table>
        </div>
      </div>
    </div>
    <div class="mt-3 flex justify-content-end column-gap-4">
      <button
        pButton
        type="button"
        label="Cancel"
        icon="pi pi-times-circle"
        severity="danger"
        (click)="closeModal()"
        class="p-button-sm">
      </button>
      <button
        pButton
        type="button"
        label="Add Selected QRs"
        icon="pi pi-plus-circle"
        [disabled]="selectedQRs().length === 0"
        severity="success"
        (click)="onSubmit()"
        class="p-button-sm">
      </button>
    </div>
  </div>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
