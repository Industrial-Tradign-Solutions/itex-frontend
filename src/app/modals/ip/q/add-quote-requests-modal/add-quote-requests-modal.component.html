@if(!loading()) {
  <div class="animate__animated animate__fadeIn">
    <div class="p-fluid">
      <div class="formgrid grid">
        <div class="field col-12 md:col-3 mt-2">
          <div class="flex align-items-center check">
            <p-checkbox
              value="View Completed QR"
              [(ngModel)]="viewCompletedQR"
              (onChange)="search()"
              [binary]="true" />
            <label class="lablel-check">View Completed QR</label>
          </div>
        </div>
        <div class="field col-12">
          <p-table
            [value]="listQR()"
            [(selection)]="selectedQR"
            dataKey="id"
            [scrollable]="true"
            scrollHeight="20rem"
            [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="header">
              <tr>
                <th style="width: 4rem"></th>
                <th>QR #</th>
                <th>SUPPLIER</th>
                <th>STATUS</th>
                <th>DATE OF CREATED</th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-quoteRequest>
              <tr>
                <td>
                  <p-tableCheckbox [value]="quoteRequest" />
                </td>
                <td>{{quoteRequest.name}}</td>
                <td>{{quoteRequest.supplier.name}}</td>
                <td>
                  <span [class]="'customer-badge status-' + getStatusColor(quoteRequest.status)">
                    {{quoteRequest.status}}
                  </span>
                </td>
                <td>{{quoteRequest.createdAt | date:'MMM dd, yyyy hh:mm a'}}</td>
              </tr>
            </ng-template>
          </p-table>
        </div>
      </div>
    </div>
    <div class="mt-3 flex justify-content-end column-gap-4">
      <button
        pButton
        type="button"
        label="Cancel"
        icon="pi pi-times-circle"
        severity="danger"
        (click)="closeModal()"
        class="p-button-sm">
      </button>
      <button
        pButton
        type="button"
        label="Add Selected QRs"
        icon="pi pi-plus-circle"
        [disabled]="selectedQR.length === 0"
        severity="success"
        (click)="onSubmit()"
        class="p-button-sm">
      </button>
    </div>
  </div>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
        class="w-20rem animate__animated animate__fadeIn"
        mode="indeterminate">
    </p-progressBar>
  </div>
}
