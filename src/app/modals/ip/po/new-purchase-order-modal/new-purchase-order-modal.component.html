@if(!loading()) {
  <div class="p-fluid w-full">
    <form [formGroup]="form">
      <div class="formgrid grid">
        <div class="field col-12 md:col-6">
          <p-floatLabel>
            <p-autoComplete
              formControlName="clientId"
              [suggestions]="filteredClients"
              (completeMethod)="searchClient($event)"
              (onKeyUp)="searchByClient($event)"
              optionValue="id"
              appendTo="body"
              [showClear]="true"
              (onClear)="onClientCleared()"
              (onSelect)="onClientSelected()"
              optionLabel="showName"/>
            <label>Client</label>
          </p-floatLabel>
        </div>
        <div class="field col-12 md:col-3">
          <p-floatLabel>
            <p-dropdown
              selected
              formControlName="currency"
              [options]="listCurrency()"
              optionLabel="value"
              (onChange)="onFilterChanged()"
              appendTo="body"
              optionValue="key"/>
            <label>Currency</label>
          </p-floatLabel>
        </div>
        <div class="field col-12 md:col-3">
          <div class="flex align-items-center check">
            <p-checkbox
              [binary]="true"
              [(ngModel)]="viewCompleted"
              [ngModelOptions]="{standalone: true}"
              (onChange)="onFilterChanged()"
              [disabled]="!canSearch()"/>
            <label class="lablel-check">View Completed Q</label>
          </div>
        </div>
        <div class="col-12">
          @if(listQuotations().length > 0) {
            <p-table
              [value]="listQuotations()"
              dataKey="id"
              [scrollable]="true"
              scrollHeight="20rem"
              [tableStyle]="{'min-width': '50rem'}">
              <ng-template pTemplate="caption">
                <div class="list-title">
                  <b>LIST QUOTATIONS</b>
                </div>
              </ng-template>
              <ng-template pTemplate="header">
                <tr>
                  <th style="width: 4rem"></th>
                  <th>Q #</th>
                  <th>SUPPLIER</th>
                  <th>STATUS</th>
                  <th>DATE OF APPLICATION</th>
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-q>
                <tr [class.p-highlight]="selectedQ?.id === q.id">
                  <td>
                    <p-radioButton
                      [value]="q"
                      name="selectedQuotation"
                      [(ngModel)]="selectedQ"
                      [ngModelOptions]="{standalone: true}"
                      (click)="toggleQSelection(q)"
                      [inputId]="'q-' + q.id"/>
                  </td>
                  <td>{{q.name}}</td>
                  <td>{{getSupplierDisplay(q)}}</td>
                  <td>
                    <span [class]="'customer-badge status-' + getStatusColor(q.status)">
                      {{q.status}}
                    </span>
                  </td>
                  <td>{{ (q.applicationAt | date:'MMM dd, yyyy hh:mm a') || '\u2014' }}</td>
                </tr>
              </ng-template>
            </p-table>
          }
        </div>
        @if(selectedQ) {
          <div class="field col-12 md:col-4">
            <p-floatLabel>
              <p-dropdown
                formControlName="supplierId"
                [options]="listSuppliers()"
                optionLabel="name"
                optionValue="id"
                appendTo="body"
                [showClear]="false"
                placeholder="Select Supplier"/>
              <label>Supplier</label>
            </p-floatLabel>
          </div>
        }
      </div>
    </form>
  </div>
  <div class="mt-3 flex justify-content-end column-gap-4">
    <button
      type="button"
      pButton
      icon="pi pi-times-circle"
      class="p-button-sm p-button-danger"
      label="Cancel"
      (click)="closeModal()">
    </button>
    <button
      pButton
      type="button"
      label="Save"
      icon="pi pi-save"
      [disabled]="form.invalid"
      (click)="createPurchaseOrder()"
      class="p-button-sm p-button-success">
    </button>
  </div>
} @else {
  <div class="field col animate__animated animate__fadeIn">
    <p-progressBar
      class="w-20rem animate__animated animate__fadeIn"
      mode="indeterminate">
    </p-progressBar>
  </div>
}
